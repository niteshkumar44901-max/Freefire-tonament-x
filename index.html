<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Tournament Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a12; --card: #16213e; }
        body { 
            font-family: sans-serif; 
            background: var(--bg); 
            color: white; 
            margin: 0; 
            padding: 0; 
            display: none; /* Login check hone tak page chhupa rahega */
        }
        .header { background: #16213e; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon); position: sticky; top: 0; z-index: 100; }
        .coin-box { background: rgba(0,242,255,0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--neon); color: var(--neon); font-weight: bold; }
        .container { padding: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .match-title { color: var(--neon); margin: 0 0 10px 0; font-size: 18px; }
        .match-info { font-size: 13px; color: #aaa; margin-bottom: 15px; }
        .join-btn { background: var(--neon); color: #000; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        /* Loading Text */
        #loader { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-weight: bold; color: var(--neon); background: var(--bg);
        }
    </style>
</head>
<body>

    <div id="loader">Checking Player Status...</div>

    <div id="main-content">
        <div class="header">
            <span>FF TOURNAMENT PRO</span>
            <div class="coin-box">🪙 <span id="userCoins">0</span></div>
        </div>

        <div class="container">
            <div class="card">
                <h3 class="match-title">⚔️ BERMUDA MASTERS</h3>
                <div class="match-info">
                    Entry Fee: 20 Coins | Prize Pool: ₹100 <br>
                    Map: Bermuda | Mode: Solo
                </div>
                <button class="join-btn" onclick="joinMatch(20)">JOIN MATCH</button>
            </div>
        </div>
    </div>

    <script>
        // ✅ Tumhari Asli Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCSlWTIwhSWh6vMDRXgzg0NAAOhJikrYME",
            authDomain: "ff-tonament-5995a.firebaseapp.com",
            databaseURL: "https://ff-tonament-5995a-default-rtdb.firebaseio.com",
            projectId: "ff-tonament-5995a",
            storageBucket: "ff-tonament-5995a.firebasestorage.app",
            messagingSenderId: "907573402759",
            appId: "1:907573402759:web:fa0c9da017f3047b336c22"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // 🛡️ SMART LOGIN CHECK (Fixes Reload Loop)
        auth.onAuthStateChanged((user) => {
            if (user) {
                // User login hai! Page dikhao aur loader hatao
                document.getElementById('loader').style.display = "none";
                document.body.style.display = "block";
                loadCoins();
            } else {
                // User login nahi hai! Turant login page par bhejo
                window.location.href = "login.html";
            }
        });

        // Coins database link
        const dbURL = "https://ff-tonament-5995a-default-rtdb.firebaseio.com/users/nitesh_kumar/coins.json";

        function loadCoins() {
            fetch(dbURL).then(res => res.json()).then(data => {
                document.getElementById('userCoins').innerText = data || 0;
            }).catch(err => console.error("Coins load nahi huye:", err));
        }

        function joinMatch(fee) {
            let coins = parseInt(document.getElementById('userCoins').innerText);
            if(coins >= fee) {
                // Coins kato aur update karo
                fetch(dbURL, { method: 'PUT', body: JSON.stringify(coins - fee) })
                .then(() => {
                    alert("✅ Success! Aap match mein join ho gaye ho.");
                    loadCoins();
                });
            } else {
                alert("❌ Coins kam hain bhai! Recharge karo.");
            }
        }
    </script>
</body>
</html>
