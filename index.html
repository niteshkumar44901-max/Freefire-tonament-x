
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>FF Tournament Pro</title>
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a12; --card: #16213e; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border-left: 5px solid #ffcc00; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .prize-row { display: flex; justify-content: space-around; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; margin: 15px 0; font-size: 13px; }
        .join-btn { width: 100%; padding: 12px; background: var(--neon); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .view-btn { width: 100%; padding: 10px; background: transparent; color: var(--neon); border: 1px solid var(--neon); border-radius: 8px; font-weight: bold; cursor: pointer; }
        #idModal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#16213e; padding:20px; border-radius:15px; border:2px solid var(--neon); width:80%; z-index:100; text-align:center; }
        #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:90; }
    </style>
</head>
<body>

    <h2 style="text-align:center; color:var(--neon);">FF TOURNAMENT PRO</h2>

    <div class="card">
        <h3 style="margin:0;">⚔️ BERMUDA SOLO</h3>
        
        <div class="prize-row">
            <div><p style="margin:0; color:#aaa;">Entry</p><b id="displayEntry">₹20</b></div>
            <div style="border-left:1px solid #444; border-right:1px solid #444; padding:0 10px;">
                <p style="margin:0; color:#aaa;">Per Kill</p><b id="displayPK" style="color:#ffcc00;">₹5</b>
            </div>
            <div><p style="margin:0; color:#aaa;">Booyah</p><b id="displayWin" style="color:#25D366;">₹100</b></div>
        </div>

        <button class="join-btn" onclick="join()">JOIN MATCH</button>
        <button class="view-btn" onclick="show()">VIEW ID / PASSWORD</button>
    </div>

    <div id="overlay" onclick="hide()"></div>
    <div id="idModal">
        <h3>🎮 ROOM DETAILS</h3>
        <p>ID: <span id="rid" style="font-weight:bold; color:var(--neon);">---</span></p>
        <p>PASS: <span id="rpass" style="font-weight:bold; color:var(--neon);">---</span></p>
        <button onclick="hide()" style="width:100%; background:#ff0055; color:white; border:none; padding:10px; border-radius:8px;">CLOSE</button>
    </div>

    <script>
        const db = "https://ff-tonament-5995a-default-rtdb.firebaseio.com/match_settings.json";

        // Database se data load karna
        function loadData() {
            fetch(db).then(res => res.json()).then(data => {
                if(data) {
                    document.getElementById('displayWin').innerText = "₹" + data.win;
                    document.getElementById('displayPK').innerText = "₹" + data.perkill;
                    document.getElementById('rid').innerText = data.id;
                    document.getElementById('rpass').innerText = data.pass;
                }
            });
        }
        loadData();

        function join() {
            if(confirm("Join Match? ₹20 katenge.")) {
                alert("✅ Joined! WhatsApp Group Join Karein.");
                window.location.href = "https://chat.whatsapp.com/CanP81lzBVo6gQkpe0suHx";
            }
        }

        function show() {
            document.getElementById('idModal').style.display = "block";
            document.getElementById('overlay').style.display = "block";
        }

        function hide() {
            document.getElementById('idModal').style.display = "none";
            document.getElementById('overlay').style.display = "none";
        }
    </script>
</body>
</html>
