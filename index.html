<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>FF Tournament Official</title>
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a12; --card: #16213e; --green: #25D366; --red: #ff4d4d; --gold: #ffd700; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        
        /* Registration Section */
        #login-section { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--neon); text-align: center; margin-top: 20px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: none; background: #05050a; color: white; box-sizing: border-box; border-bottom: 2px solid var(--neon); font-size: 16px; }
        
        /* Rules Container */
        .rules-container { background: rgba(0,0,0,0.6); border: 1px solid #333; padding: 15px; border-radius: 12px; text-align: left; font-size: 13px; margin: 20px 0; line-height: 1.5; }
        .rules-container h4 { color: var(--gold); margin: 0 0 10px 0; border-bottom: 1px solid #444; }

        /* App Section */
        #app-section { display: none; }
        .user-bar { display: flex; justify-content: space-between; align-items: center; background: #16213e; padding: 12px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border-top: 5px solid var(--green); text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .join-btn { width: 100%; padding: 18px; background: var(--green); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; text-transform: uppercase; }
        .view-btn { width: 100%; padding: 12px; background: transparent; color: var(--neon); border: 1px solid var(--neon); border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="login-section">
        <h2 style="color:var(--neon); margin-bottom:5px;">TOURNAMENT LOGIN</h2>
        <p style="font-size:12px; color:#aaa;">Register karke match join karein</p>
        
        <input type="text" id="playerName" placeholder="Free Fire Name">
        <input type="number" id="playerUID" placeholder="Free Fire UID">
        <input type="number" id="playerWhatsApp" placeholder="WhatsApp Number">

        <div class="rules-container">
            <h4>🏆 OFFICIAL RULES</h4>
            • 🚫 No Hack/Cheat (Ban)<br>
            • 🚷 No Team-up Allowed<br>
            • 📱 Mobile Only Players<br>
            • 📸 Win Screenshot is Mandatory
        </div>

        <button onclick="doLogin()" style="width:100%; padding:16px; background:var(--neon); color:black; border:none; border-radius:10px; font-weight:bold; font-size:16px;">AGREE & START</button>
    </div>

    <div id="app-section">
        <div class="user-bar">
            <span>Welcome, <b id="welcomeUser" style="color:var(--neon);"></b> 👋</span>
            <button onclick="logout()" style="background:var(--red); color:white; border:none; padding:6px 12px; border-radius:6px; font-size:11px; font-weight:bold;">LOGOUT</button>
        </div>

        <div class="card">
            <h3 style="margin:0; font-size:22px;">⚔️ DAILY PRACTICE BATTLE</h3>
            <p style="color:#aaa; font-size:14px; margin:10px 0;">Bermuda Solo | Entry: FREE</p>
            
            <div style="display:flex; justify-content:space-around; background:rgba(0,0,0,0.3); padding:15px; border-radius:15px; margin:20px 0;">
                <div><small>Prize Pool</small><br><b style="color:var(--gold); font-size:20px;">₹10</b></div>
                <div style="border-left:1px solid #444; border-right:1px solid #444; padding:0 20px;"><small>Type</small><br><b>SOLO</b></div>
                <div><small>Booyah</small><br><b style="color:var(--neon); font-size:20px;">₹10</b></div>
            </div>

            <button class="join-btn" onclick="joinWhatsApp()">JOIN WHATSAPP GROUP</button>
            <button class="view-btn" onclick="alert('Room ID/Pass: Group join karein, wahan update aayega!')">VIEW ROOM ID/PASS</button>
        </div>
    </div>

    <script>
        const dbURL = "https://ff-tonament-5995a-default-rtdb.firebaseio.com/";
        // NAYA RESET LINK UPDATE KAR DIYA HAI
        const whatsappLink = "https://chat.whatsapp.com/IOwj4Tk6Mq5JNwqyRuI0IL?mode=gi_t";

        window.onload = function() {
            const user = localStorage.getItem('ff_user');
            if(user) { showApp(user); }
        };

        function doLogin() {
            const name = document.getElementById('playerName').value.trim();
            const uid = document.getElementById('playerUID').value.trim();
            const phone = document.getElementById('playerWhatsApp').value.trim();

            if(name.length >= 3 && uid.length >= 8 && phone.length >= 10) {
                localStorage.setItem('ff_user', name);
                fetch(dbURL + "players/" + name + ".json", { 
                    method: 'PUT', 
                    body: JSON.stringify({name, uid, phone, date: new Date().toLocaleString()}) 
                });
                showApp(name);
            } else {
                alert("Bhai, sari details sahi se dalo!");
            }
        }

        function showApp(name) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            document.getElementById('welcomeUser').innerText = name;
        }

        function joinWhatsApp() {
            window.location.href = whatsappLink;
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
