<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>FF Tournament Login</title>
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a12; --card: #16213e; --green: #25D366; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        
        /* Login Box Styling */
        #login-section { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--neon); text-align: center; margin-top: 50px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #05050a; color: white; box-sizing: border-box; border-bottom: 2px solid var(--neon); }
        
        /* Main App Styling */
        #app-section { display: none; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border-top: 4px solid var(--green); text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .prize-row { display: flex; justify-content: space-around; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; margin: 15px 0; }
        .join-btn { width: 100%; padding: 15px; background: var(--green); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-bottom: 10px; }
        .view-btn { width: 100%; padding: 10px; background: transparent; color: var(--neon); border: 1px solid var(--neon); border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        #idModal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#16213e; padding:25px; border-radius:15px; border:2px solid var(--neon); width:85%; z-index:100; text-align:center; }
        #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:90; }
    </style>
</head>
<body>

    <div id="login-section">
        <h2 style="color:var(--neon);">🎮 PLAYER LOGIN</h2>
        <p style="font-size:12px; color:#aaa;">Pehle apni details bharein</p>
        <input type="text" id="playerName" placeholder="Free Fire Name (In-game)">
        <input type="number" id="playerWhatsApp" placeholder="WhatsApp Number">
        <button onclick="doLogin()" style="width:100%; padding:15px; background:var(--neon); border:none; border-radius:8px; font-weight:bold; margin-top:10px;">PROCEED TO PLAY</button>
    </div>

    <div id="app-section">
        <div style="text-align:center; margin-bottom:20px;">
            <h2 style="color:var(--neon);">🏆 FF TOURNAMENT</h2>
            <p id="welcomeUser" style="font-size:14px; color:var(--green);"></p>
        </div>

        <div class="card">
            <h3>⚔️ TEST MATCH (FREE)</h3>
            <div class="prize-row">
                <div><p style="margin:0; font-size:11px;">Entry</p><b style="color:var(--green);">FREE</b></div>
                <div><p style="margin:0; font-size:11px;">Kills</p><b>₹0</b></div>
                <div><p style="margin:0; font-size:11px;">Booyah</p><b style="color:var(--neon);" id="winPrize">₹10</b></div>
            </div>
            <button class="join-btn" onclick="joinMatch()">JOIN NOW</button>
            <button class="view-btn" onclick="showModal()">VIEW ID/PASS</button>
        </div>
    </div>

    <div id="overlay" onclick="hideModal()"></div>
    <div id="idModal">
        <h3>🎮 ROOM DETAILS</h3>
        <p>ID: <span id="rid" style="font-weight:bold; color:var(--neon);">---</span></p>
        <p>PASS: <span id="rpass" style="font-weight:bold; color:var(--neon);">---</span></p>
        <button onclick="hideModal()" style="width:100%; background:#ff0055; color:white; border:none; padding:10px; border-radius:8px;">CLOSE</button>
    </div>

    <script>
        const dbURL = "https://ff-tonament-5995a-default-rtdb.firebaseio.com/";
        const whatsappGroup = "https://chat.whatsapp.com/CanP81lzBVo6gQkpe0suHx?mode=gi_t";

        // Login check on page load
        window.onload = function() {
            const savedName = localStorage.getItem('ff_name');
            if(savedName) {
                showApp(savedName);
            }
        };

        function doLogin() {
            const name = document.getElementById('playerName').value;
            const phone = document.getElementById('playerWhatsApp').value;

            if(name && phone) {
                // Firebase mein save karna
                fetch(dbURL + "players/" + name + ".json", {
                    method: 'PUT',
                    body: JSON.stringify({ name: name, phone: phone, date: new Date() })
                });

                localStorage.setItem('ff_name', name);
                showApp(name);
            } else {
                alert("Please fill all details!");
            }
        }

        function showApp(name) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            document.getElementById('welcomeUser').innerText = "Welcome, " + name + "!";
            loadMatchData();
        }

        function loadMatchData() {
            fetch(dbURL + "match_data.json").then(res => res.json()).then(data => {
                if(data) {
                    document.getElementById('winPrize').innerText = "₹" + data.win;
                    document.getElementById('rid').innerText = data.id;
                    document.getElementById('rpass').innerText = data.pass;
                }
            });
        }

        function joinMatch() {
            const name = localStorage.getItem('ff_name');
            fetch(dbURL + "joined_players/" + name + ".json", { method: 'PUT', body: JSON.stringify({joined: true}) });
            alert("Joined Successfully!");
            window.location.href = whatsappGroup;
        }

        function showModal() {
            document.getElementById('idModal').style.display = "block";
            document.getElementById('overlay').style.display = "block";
        }

        function hideModal() {
            document.getElementById('idModal').style.display = "none";
            document.getElementById('overlay').style.display = "none";
        }
    </script>
</body>
</html>
