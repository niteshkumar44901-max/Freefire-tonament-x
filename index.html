<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>FF Tournament Pro</title>
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a12; --card: #16213e; --green: #25D366; --red: #ff4d4d; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        #login-section { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--neon); text-align: center; margin-top: 30px; }
        #app-section { display: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #05050a; color: white; box-sizing: border-box; border-bottom: 2px solid var(--neon); font-size: 16px; }
        .rules { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 10px; font-size: 11px; text-align: left; color: #ccc; margin: 15px 0; border: 1px solid #444; }
        .join-btn { width: 100%; padding: 16px; background: var(--green); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); }
        .user-bar { display: flex; justify-content: space-between; padding: 10px; background: #16213e; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="login-section">
        <h2 style="color:var(--neon);">🎮 PLAYER LOGIN</h2>
        <input type="text" id="playerName" placeholder="Free Fire Name">
        <input type="number" id="playerUID" placeholder="Free Fire UID">
        <input type="number" id="playerWhatsApp" placeholder="WhatsApp Number">
        
        <div class="rules">
            <b style="color:var(--red);">RULES:</b> No Hacks | No Team-up | UID must be correct for Prize Payment.
        </div>
        
        <button onclick="doLogin()" style="width:100%; padding:15px; background:var(--neon); color:black; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">AGREE & PROCEED</button>
    </div>

    <div id="app-section">
        <div class="user-bar">
            <span>Hi, <b id="welcomeUser" style="color:var(--neon);"></b></span>
            <button onclick="localStorage.clear(); location.reload();" style="background:var(--red); color:white; border:none; padding:5px 10px; border-radius:5px; font-size:11px;">LOGOUT</button>
        </div>

        <div style="background:var(--card); padding:20px; border-radius:15px; text-align:center; border-top:4px solid var(--green);">
            <h3 style="margin:0;">⚔️ FREE TEST MATCH</h3>
            <p style="color:#aaa; font-size:13px;">Map: Bermuda Solo</p>
            <h2 style="color:var(--neon);">Booyah: ₹10</h2>
            
            <button class="join-btn" onclick="goToWhatsApp()">JOIN WHATSAPP GROUP</button>
        </div>
    </div>

    <script>
        // FIREBASE LINK
        const dbURL = "https://ff-tonament-5995a-default-rtdb.firebaseio.com/";
        // SAHI WHATSAPP LINK (Extra kachra hata diya)
        const myGroup = "https://chat.whatsapp.com/CanP81lzBVo6gQkpe0suHx";

        window.onload = function() {
            const user = localStorage.getItem('ff_user');
            if(user) { showApp(user); }
        };

        function doLogin() {
            const name = document.getElementById('playerName').value.trim();
            const uid = document.getElementById('playerUID').value.trim();
            const phone = document.getElementById('playerWhatsApp').value.trim();

            if(name && uid.length >= 8 && phone.length >= 10) {
                localStorage.setItem('ff_user', name);
                // Firebase mein data save karna
                fetch(dbURL + "players/" + name + ".json", { 
                    method: 'PUT', 
                    body: JSON.stringify({name, uid, phone}) 
                });
                showApp(name);
            } else {
                alert("Bhai, Details sahi se dalo! UID aur Phone sahi hona chahiye.");
            }
        }

        function showApp(name) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            document.getElementById('welcomeUser').innerText = name;
        }

        function goToWhatsApp() {
            // Nayi window mein kholne ke liye
            window.open(myGroup, "_blank");
        }
    </script>
</body>
</html>
