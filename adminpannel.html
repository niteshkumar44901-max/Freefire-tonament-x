<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Admin - Control Room</title>
    <style>
        body { font-family: sans-serif; background: #05050a; color: white; padding: 20px; }
        .card { background: #16213e; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-top: 4px solid #00f2ff; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #0a0a12; color: white; font-size: 16px; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; background: #00f2ff; color: black; margin-top: 10px; }
        .wa-btn { background: #25D366; color: white; }
        .room-btn { background: #ff0055; color: white; }
    </style>
</head>
<body>
    <h2>🚀 ADMIN CONTROL</h2>

    <div class="card">
        <h3>⚔️ Bermuda Match Prize</h3>
        <input type="number" id="fee" placeholder="Entry Fee">
        <input type="text" id="win" placeholder="Prize Money (e.g. ₹100)">
        <button onclick="updateBermuda()">UPDATE MATCH</button>
    </div>

    <div class="card">
        <h3>🔑 Room ID & Password</h3>
        <input type="text" id="rid" placeholder="Room ID">
        <input type="text" id="rpass" placeholder="Room Password">
        <button class="room-btn" onclick="updateRoom()">SEND ID/PASS TO APP</button>
    </div>

    <div class="card">
        <h3>🔗 WhatsApp Link</h3>
        <input type="text" id="wa" placeholder="https://chat.whatsapp.com/...">
        <button class="wa-btn" onclick="updateWA()">SAVE WA LINK</button>
    </div>

    <script>
        // Database Link
        const db = "https://ff-tonament-5995a-default-rtdb.firebaseio.com/";

        function updateBermuda() {
            let f = document.getElementById('fee').value;
            let w = document.getElementById('win').value;
            if(!f || !w) return alert("Khali mat chhodo!");
            
            let data = { entry: parseInt(f), win: w };
            fetch(db + "matches/bermuda.json", { method: 'PUT', body: JSON.stringify(data) })
            .then(() => alert("✅ Match Updated!"));
        }

        function updateRoom() {
            let i = document.getElementById('rid').value;
            let p = document.getElementById('rpass').value;
            if(!i || !p) return alert("ID/Pass dalo!");

            let data = { id: i, pass: p };
            fetch(db + "room_details.json", { method: 'PUT', body: JSON.stringify(data) })
            .then(() => alert("✅ ID/Pass Sent to App!"));
        }

        function updateWA() {
            let link = document.getElementById('wa').value;
            if(!link) return alert("Link dalo!");

            fetch(db + "settings/whatsapp.json", { method: 'PUT', body: JSON.stringify(link) })
            .then(() => alert("✅ WhatsApp Link Updated!"));
        }
    </script>
</body>
</html>
