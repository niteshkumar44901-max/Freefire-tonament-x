<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Low Budget Mode</title>
    <style>
        body { background: #0a0a12; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .box { background: #16213e; padding: 15px; border-radius: 12px; border: 1px solid #00f2ff; margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #05050a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #25D366; color: white; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        label { font-size: 12px; color: #aaa; margin-left: 5px; }
    </style>
</head>
<body>

    <h2 style="color:#00f2ff;">🚀 ADMIN CONTROL</h2>
    
    <div class="box">
        <label>Map Name</label>
        <input type="text" id="m" placeholder="e.g. Bermuda, Kalahari">
        
        <label>Booyah Prize (₹)</label>
        <input type="text" id="w" placeholder="e.g. 10">
        
        <label>Room ID</label>
        <input type="text" id="ri" placeholder="Enter Room ID">
        
        <label>Room Password</label>
        <input type="text" id="rp" placeholder="Enter Password">
        
        <button onclick="update()">SAB UPDATE KARO</button>
    </div>

    <script>
        function update() {
            const db = "https://ff-tonament-5995a-default-rtdb.firebaseio.com/match_data.json";
            const data = {
                map: document.getElementById('m').value,
                win: document.getElementById('w').value,
                id: document.getElementById('ri').value,
                pass: document.getElementById('rp').value
            };

            fetch(db, { method: 'PUT', body: JSON.stringify(data) })
            .then(() => alert("✅ Done! Match Update ho gaya."));
        }
    </script>
</body>
</html>
